<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Subway Live</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="map"></div>

  <!-- Top-left info panel -->
  <div id="panel">
    <div id="panel-header">
      <div id="live-indicator" title="Live data">
        <span id="live-dot"></span>
        <span>LIVE</span>
      </div>
      <div id="panel-title">NYC Subway</div>
    </div>

    <div id="train-count-row">
      <span id="train-count">—</span>
      <span id="train-count-label"> trains active</span>
    </div>

    <!-- Legend — click rows to filter (multi-select supported) -->
    <div id="legend"></div>

    <!-- Shown when one or more legend rows are selected -->
    <div id="line-info" class="hidden">
      <div id="line-info-header">
        <span id="line-info-name"></span>
        <button id="line-info-close" title="Clear filter">✕</button>
      </div>
      <div id="line-info-stats">
        <div class="stat-item">
          <div class="stat-value" id="line-info-count">—</div>
          <div class="stat-label">active</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="line-info-north">—</div>
          <div class="stat-label">↑ north</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="line-info-south">—</div>
          <div class="stat-label">↓ south</div>
        </div>
      </div>

      <!-- History section — only shown when a single line is selected -->
      <div id="line-history" class="hidden">
        <div id="line-history-title"></div>
        <div id="line-history-text"></div>
      </div>
    </div>

    <div id="footer-row">
      <div id="last-updated"></div>
      <button id="heatmap-btn" title="Toggle density heatmap">◌ Heat</button>
      <button id="refresh-btn" title="Refresh now">↻</button>
    </div>
  </div>

  <!-- Hover tooltip -->
  <div id="tooltip" class="hidden">
    <div id="tooltip-line"></div>
    <div id="tooltip-status"></div>
    <div id="tooltip-stop"></div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-message"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
